<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fsoicity.dat</title>
    <style>
        body, html {
            background-color: #0d0000;
            color: #ff0000;
            font-family: "Courier New", Courier, monospace;
            margin: 0; padding: 0; overflow: hidden; height: 100%;
        }

        /* CRT Overlay */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 3px; z-index: 200; pointer-events: none;
        }

        .main-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
        }

        .mask { width: 220px; filter: drop-shadow(0 0 10px #ff0000); animation: flicker 0.15s infinite; }
        
        /* ORIGINAL VERSION WARNING STYLE */
        .warning-box {
            color: white;
            background: #ff0000;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 1.5rem;
            margin: 20px 0;
            text-transform: uppercase;
            animation: blink 0.8s infinite;
        }

        .btn-execute {
            background: transparent; color: #ff0000; border: 2px solid #ff0000;
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px; transition: 0.3s;
            margin-top: 10px;
        }

        .btn-execute:hover { background: #ff0000; color: black; box-shadow: 0 0 20px #ff0000; }

        canvas { position: fixed; top: 0; left: 0; display: none; z-index: 1; }

        /* THE BLACKOUT & RECOVERY */
        #blackout, #the-reveal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-fix {
            color: #00ff00; border: 1px solid #00ff00; background: transparent;
            padding: 10px 20px; cursor: pointer; font-family: "Courier New";
        }

        .army-img {
            width: 90%; max-width: 900px;
            filter: grayscale(100%) sepia(100%) hue-rotate(-50deg) saturate(800%);
            animation: glitch-img 0.1s infinite;
        }

        .hidden { display: none !important; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes flicker { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.9; } }
        @keyframes glitch-img {
            0% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="main-screen" id="main-content">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Logo_fsociety.svg/1024px-Logo_fsociety.svg.png" alt="fsociety" class="mask">
        <h1>FSOCIETY</h1>
        <div class="warning-box">YOUR COMPUTER HAS BEEN INFECTED</div>
        <p>> We are anonymous. We are legion.</p>
        <button class="btn-execute" onclick="startTheHack()">INITIALIZE EXPLOIT</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="blackout">
        <p style="color: #444; margin-bottom: 20px;">CRITICAL SYSTEM ERROR: 0x004F21</p>
        <button class="btn-fix" onclick="revealArmy()">START SYSTEM BUG FIXES</button>
    </div>

    <div id="the-reveal">
        <h1 style="color:white; letter-spacing: 5px;">WE ARE FSOCIETY. WE ARE FINALLY FREE.</h1>
        <img src="https://i.imgur.com/eBf6d6P.jpg" class="army-img" alt="fsociety army">
        <p style="color:red; margin-top: 20px;">LEAVE THE WORLD BEHIND.</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let colorMode = "#ff0000";

        function startTheHack() {
            document.getElementById('main-content').classList.add('hidden');
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = "ｦｱｳｴｵｶｷｸｹｺｻｼｽｾｿﾀ0123456789ABCDEF";
            const fontSize = 18;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = colorMode;
                ctx.font = fontSize + "px Courier New";
                drops.forEach((y, i) => {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, y * fontSize);
                    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(draw, 33);

            // SHORTENED GLITCH PHASE (Starts colors after 2s, Blackout after 5s)
            setTimeout(() => {
                setInterval(() => {
                    colorMode = ["#ff0000", "#00ff00", "#00ffff", "#ffff00", "#ffffff"][Math.floor(Math.random()*5)];
                }, 150);
            }, 2000);

            setTimeout(() => {
                canvas.style.display = 'none';
                document.getElementById('blackout').style.display = 'flex';
            }, 5500);
        }

        function revealArmy() {
            document.getElementById('blackout').style.display = 'none';
            document.getElementById('the-reveal').style.display = 'flex';
            
            // Background flicker for the finale
            setInterval(() => {
                document.getElementById('the-reveal').style.backgroundColor = 
                    Math.random() > 0.95 ? "#200" : "black";
            }, 80);
        }
    </script>
</body>
</html>
